name: Deploy over SSH
uses: appleboy/ssh-action@v1.2.0
with:
  host: ${{ secrets.VPS_HOST }}
  username: root
  password: ${{ secrets.VPS_KEY }}
  port: 22
  script: |
    set -e
    cd /root/api
    git fetch origin main
    git reset --hard origin/main
    docker compose up -d --build
    docker image prune -f
